<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomSense - Pemantauan Ruangan</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- Top Header -->
        <header>
            <div class="header-title">
                <h1>RoomSense <span>•</span> Pemantauan Ruangan</h1>
                <p>
                    <span id="conn-dot" class="status-dot"></span>
                    <span id="conn-text">Menghubungkan...</span>
                </p>
            </div>
            <!-- Download Button linking to the Node-RED CSV API -->
            <a href="/api/export" class="btn-download" id="download-link">
                <!-- SVG Document Download Icon -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Unduh Data (CSV)
            </a>
        </header>

        <!-- Main Content -->
        <div class="main-grid">
            <!-- Left: Chart -->
            <div class="chart-section">
                <div class="section-header">Grafik Tren 50 Data Terakhir</div>
                <div class="chart-wrapper">
                    <canvas id="roomsenseChart"></canvas>
                </div>
            </div>

            <!-- Right: Metrics Cards -->
            <div class="cards-section">
                <!-- Card Suhu -->
                <div class="metric-card">
                    <div class="metric-header">
                        <span>Suhu Aktual</span>
                        <span class="metric-icon icon-temp">🌡️</span>
                    </div>
                    <div class="metric-body">
                        <span class="metric-value" id="temp-val">--</span>
                        <span class="metric-unit">°C</span>
                    </div>
                    <div class="metric-footer">
                        <span class="comfort-badge badge-normal" id="temp-badge">Mengukur...</span>
                        <span class="metric-desc" id="temp-desc">Rentang nyaman: 20-26°C</span>
                    </div>
                </div>

                <!-- Card Kelembaban -->
                <div class="metric-card">
                    <div class="metric-header">
                        <span>Kelembaban</span>
                        <span class="metric-icon icon-humid">💧</span>
                    </div>
                    <div class="metric-body">
                        <span class="metric-value" id="humid-val">--</span>
                        <span class="metric-unit">%</span>
                    </div>
                    <div class="metric-footer">
                        <span class="comfort-badge badge-normal" id="humid-badge">Mengukur...</span>
                        <span class="metric-desc" id="humid-desc">Rentang nyaman: 40-60%</span>
                    </div>
                </div>

                <!-- Card Heat Index -->
                <div class="metric-card">
                    <div class="metric-header">
                        <span>Heat Index</span>
                        <span class="metric-icon icon-hi">⚠️</span>
                    </div>
                    <div class="metric-body">
                        <span class="metric-value" id="hi-val">--</span>
                        <span class="metric-unit">°C</span>
                    </div>
                    <div class="metric-footer">
                        <span class="comfort-badge badge-normal" id="hi-badge">Mengukur...</span>
                        <span class="metric-desc" id="hi-desc">Suhu semu yang dirasakan</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
